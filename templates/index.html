<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ================================================== -->
    <!-- META -->
    <!-- ================================================== -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
     Repo Downloader
    </title>

    <!-- ================================================== -->
    <!-- BOOTSTRAP -->
    <!-- ================================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ================================================== -->
    <!-- CUSTOM CSS -->
    <!-- ================================================== -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<!-- ====================================================== -->
<!-- MAIN CONTAINER -->
<!-- ====================================================== -->

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-10">

            <!-- ========================================== -->
            <!-- CARD -->
            <!-- ========================================== -->

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <!-- ================================== -->
                    <!-- TITLE -->
                    <!-- ================================== -->

                    <div class="text-center mb-4">

                        <h1 class="fw-bold mb-2">
                             Repo Downloader
                        </h1>


                    </div>

                    <!-- ================================== -->
                    <!-- FORM -->
                    <!-- ================================== -->

                    <form id="downloadForm">

                        <!-- ============================== -->
                        <!-- REPOSITORY URL -->
                        <!-- ============================== -->

                        <div class="mb-4">

                            <label
                                class="form-label fw-semibold"
                            >
                                Repository URL
                            </label>

                            <input
                                type="text"
                                id="repo_url"
                                class="form-control form-control-lg"
                                autocomplete="off"
                            >

                        </div>

                        <!-- ============================== -->
                        <!-- BRANCH -->
                        <!-- ============================== -->

                        <div class="mb-4">

                            <label
                                class="form-label fw-semibold"
                            >
                                Branch Name
                            </label>

                            <input
                                type="text"
                                id="branch"
                                class="form-control form-control-lg"
                                placeholder="main"
                                autocomplete="off"
                            >

                        </div>

                        <!-- ============================== -->
                        <!-- BUTTON -->
                        <!-- ============================== -->

                        <div class="d-grid">

                            <button
                                type="submit"
                                id="downloadBtn"
                                class="btn btn-primary btn-lg"
                            >
                                Download Repository
                            </button>

                        </div>

                    </form>

                    <!-- ================================== -->
                    <!-- PROGRESS -->
                    <!-- ================================== -->

                    <div
                        class="mt-4 d-none"
                        id="progressContainer"
                    >

                        <div class="mb-2">

                            <small
                                class="text-muted"
                                id="progressText"
                            >
                                Preparing download...
                            </small>

                        </div>

                        <div class="progress">

                            <div
                                class="progress-bar progress-bar-striped progress-bar-animated"
                                role="progressbar"
                                style="width: 100%"
                            >
                                Downloading...
                            </div>

                        </div>

                    </div>

                    <!-- ================================== -->
                    <!-- STATUS -->
                    <!-- ================================== -->

                    <div
                        class="mt-4"
                        id="statusBox"
                    ></div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ====================================================== -->
<!-- SCRIPT -->
<!-- ====================================================== -->

<script>

    // =====================================================
    // ENTER KEY SUPPORT
    // =====================================================

    document
        .getElementById("downloadForm")
        .addEventListener(
            "submit",
            function(event) {

                event.preventDefault();

                const repoUrl =
                    document
                        .getElementById("repo_url")
                        .value
                        .trim();

                const branch =
                    document
                        .getElementById("branch")
                        .value
                        .trim();

                // =========================================
                // ONLY SUBMIT IF BOTH FILLED
                // =========================================

                if (repoUrl && branch) {
                    downloadRepo();
                }
            }
        );

</script>

<!-- ====================================================== -->
<!-- APP JS -->
<!-- ====================================================== -->

<script
    src="{{ url_for('static', filename='js/app.js') }}"
></script>

</body>

</html>
